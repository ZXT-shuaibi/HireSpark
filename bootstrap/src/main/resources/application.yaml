server:
  port: 9090
  servlet:
    context-path: /api/ragent

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

spring:
  application:
    name: ragent${unique-name:}-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: postgres
    password: postgres
    url: jdbc:postgresql://127.0.0.1:5432/ragent?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: ragent-producer${unique-name:}_pg
    send-message-timeout: 2000

milvus:
  uri: http://localhost:19530

rag:
  vector:
    type: pg  # 可选 milvus / pg

  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE
    sse-timeout-ms: 300000  # SSE 全局超时（毫秒），默认 5 分钟

  query-rewrite:
    enabled: true

  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 15
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    summary-max-chars: 200
    hybrid-enabled: true
    recent-keep-messages: 6
    important-message-threshold: 70
    summary-max-source-messages: 30
    token-trigger-threshold: 8000
    stage-switch-trigger-enabled: true
    recovery-trigger-enabled: true
    title-max-length: 30

  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2

  trace:
    enabled: true
    max-error-length: 1000

career:
  ai:
    model-id:
    prompt-version: v1
  interview:
    follow-up:
      max-follow-up-count: 2
      low-score-threshold: 60
      low-score-fallback-question: 能否再补充一个关键细节，说明你的思路或取舍？
  features:
    resume-export: true
    text-interview: true
    voice-interview: false
    demeanor-analysis: false
  tts:
    enabled: false
    chunk-max-chars: 180
    voice: default
    cache-ttl-seconds: 3600
    provider: none
    xunfei:
      enabled: false
      app-id: ${XUNFEI_TTS_APP_ID:}
      api-key: ${XUNFEI_TTS_API_KEY:}
      api-secret: ${XUNFEI_TTS_API_SECRET:}
      host: api-dx.xf-yun.com
      create-path: /v1/private/dts_create
      query-path: /v1/private/dts_query
      language: zh
      speed: 50
      volume: 50
      pitch: 50
      rhy: 0
      audio-encoding: lame
      sample-rate: 16000
      timeout-seconds: 90
      poll-interval-millis: 1500
      max-text-chars: 100000
  demeanor:
    enabled: false
    provider: none
    retention-policy: derived-summary-only
    limitations:
      - auxiliary-signal-only
      - not-a-hiring-decision
      - requires-user-consent
    xingchen:
      enabled: false
      api-key: ${XUNFEI_XINGCHEN_API_KEY:}
      api-secret: ${XUNFEI_XINGCHEN_API_SECRET:}
      flow-id: ${XUNFEI_XINGCHEN_DEMEANOR_FLOW_ID:}
      chat-url: https://xingchen-api.xf-yun.com/workflow/v1/chat/completions
      upload-url: https://xingchen-api.xf-yun.com/workflow/v1/upload_file
      timeout-seconds: 60
      max-image-bytes: 5242880
  render:
    font:
      enabled: true
      pdf-family: Noto Sans SC
      fail-on-missing-fonts: false
      css-families:
        - Noto Sans SC
        - Noto Sans CJK SC
        - Microsoft YaHei
        - SimHei
        - SimSun
        - Arial
        - sans-serif
      paths:
        - ${RAGENT_RENDER_FONT_PATH:}
        - classpath:/fonts/NotoSansSC-Regular.ttf
        - file:C:/Windows/Fonts/NotoSansSC-VF.ttf
        - file:C:/Windows/Fonts/simhei.ttf
        - file:/usr/share/fonts/truetype/noto/NotoSansSC-Regular.ttf
        - file:/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
        - file:/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.otf
        - file:/usr/local/share/fonts/NotoSansSC-Regular.ttf
        - file:/System/Library/Fonts/PingFang.ttc
  voice:
    xunfei-ast:
      enabled: false
      app-id: ${XUNFEI_AST_APP_ID:}
      api-key: ${XUNFEI_AST_API_KEY:}
      api-secret: ${XUNFEI_AST_API_SECRET:}
      ws-base-url: wss://office-api-ast-dx.iflyaisol.com/ast/communicate/v1
      audio-encode: pcm_s16le
      lang: autodialect
      sample-rate: "16000"
      chunk-size-bytes: 1280
      send-interval-ms: 40
  websocket:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*

ai:
  providers:
    ollama:
      url: http://localhost:11434
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 1

  chat:
    default-model: qwen3-max
    deep-thinking-model: qwen3-max
    candidates:
      - id: qwen-plus
        provider: bailian
        model: qwen-plus-latest
        priority: 1
      - id: qwen3-max
        provider: bailian
        model: qwen3-max
        supports-thinking: true
        priority: 3
      - id: glm-4.7
        provider: siliconflow
        model: Pro/zai-org/GLM-4.7
        supports-thinking: true
        priority: 0
      - id: qwen3-local
        provider: ollama
        model: qwen3:8b-fp16
        priority: 2

  embedding:
    default-model: qwen-emb-8b
    candidates:
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: ${rag.default.dimension}
        priority: 1
      - id: qwen-emb-local
        provider: ollama
        model: qwen3-embedding:8b-fp16
        dimension: ${rag.default.dimension}
        priority: 2

  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

rustfs:
  url: http://localhost:9000
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

app:
  demo-mode: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
