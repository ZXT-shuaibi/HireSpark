    upstream: https://fonts.google.com/noto/specimen/Noto+Sans+SC
    license: SIL Open Font License 1.1

  - id: noto-sans-sc-bold
    family: Noto Sans SC
    style: normal
    weight: 700
    file: classpath:/fonts/NotoSansSC-Bold.ttf
    source: Google Noto Sans Simplified Chinese
    upstream: https://fonts.google.com/noto/specimen/Noto+Sans+SC
    license: SIL Open Font License 1.1

  - id: noto-sans-sc-extrabold
    family: Noto Sans SC
    style: normal
    weight: 800
    file: classpath:/fonts/NotoSansSC-ExtraBold.ttf
    source: Google Noto Sans Simplified Chinese
    upstream: https://fonts.google.com/noto/specimen/Noto+Sans+SC
    license: SIL Open Font License 1.1

  - id: noto-sans-sc-black
    family: Noto Sans SC
    style: normal
    weight: 900
    file: classpath:/fonts/NotoSansSC-Black.ttf
    source: Google Noto Sans Simplified Chinese
    upstream: https://fonts.google.com/noto/specimen/Noto+Sans+SC
    license: SIL Open Font License 1.1

  - id: noto-sans-sc-regular
    family: Noto Sans SC
    style: normal
    weight: 400
    file: classpath:/fonts/NotoSansSC-Regular.ttf
    loading:
      html: CSS font-family stack
      pdf: openhtmltopdf registered classpath font
      docx: document font declaration through XHTML import fallback
    fallback:
      - Noto Sans CJK SC
      - Microsoft YaHei
      - SimHei
      - SimSun
      - Arial
      - sans-serif
notes:
  - Full Noto Sans SC weight spectrum (Thin 100 → Black 900) for professional CJK typography.
  - Bundled fonts make CI and local PDF rendering reproducible.
  - Operators may override career.render.font.paths with licensed system or private fonts.
