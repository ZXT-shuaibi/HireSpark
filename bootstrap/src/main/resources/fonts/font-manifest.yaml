version: 2
policy: governed-cjk-render-fonts
defaultFamily: Noto Sans SC
resources:
  - id: noto-sans-sc-thin
    family: Noto Sans SC
    style: normal
    weight: 100
    file: classpath:/fonts/NotoSansSC-Thin.ttf
    source: Google Noto Sans Simplified Chinese
    upstream: https://fonts.google.com/noto/specimen/Noto+Sans+SC
    license: SIL Open Font License 1.1
    charset:
      - CJK Unified Ideographs
      - Basic Latin
      - General Punctuation
      - Currency Symbols

  - id: noto-sans-sc-extralight
    family: Noto Sans SC
    style: normal
    weight: 200
    file: classpath:/fonts/NotoSansSC-ExtraLight.ttf
    source: Google Noto Sans Simplified Chinese
    upstream: https://fonts.google.com/noto/specimen/Noto+Sans+SC
    license: SIL Open Font License 1.1

  - id: noto-sans-sc-light
