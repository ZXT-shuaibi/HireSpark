    style: normal
    weight: 300
    file: classpath:/fonts/NotoSansSC-Light.ttf
    source: Google Noto Sans Simplified Chinese
    upstream: https://fonts.google.com/noto/specimen/Noto+Sans+SC
    license: SIL Open Font License 1.1

  - id: noto-sans-sc-regular
    family: Noto Sans SC
    style: normal
    weight: 400
    file: classpath:/fonts/NotoSansSC-Regular.ttf
    source: Google Noto Sans Simplified Chinese
    upstream: https://fonts.google.com/noto/specimen/Noto+Sans+SC
    license: SIL Open Font License 1.1

  - id: noto-sans-sc-medium
    family: Noto Sans SC
    style: normal
    weight: 500
    file: classpath:/fonts/NotoSansSC-Medium.ttf
    source: Google Noto Sans Simplified Chinese
    upstream: https://fonts.google.com/noto/specimen/Noto+Sans+SC
    license: SIL Open Font License 1.1

  - id: noto-sans-sc-semibold
    family: Noto Sans SC
    style: normal
    weight: 600
    file: classpath:/fonts/NotoSansSC-SemiBold.ttf
