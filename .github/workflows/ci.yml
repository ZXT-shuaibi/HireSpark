name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Backend compile
        run: mvn -B -DskipTests compile

      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: Career render smoke tests
        run: mvn -B -pl bootstrap -am "-Dtest=ResumeRenderPipelineTest" "-Dsurefire.failIfNoSpecifiedTests=false" test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  delivery-files:
    name: Delivery Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check delivery and operations files
        run: |
          test -f Dockerfile
          test -f docs/career-agent-platform/post-fusion-enhancement-plan.md
          test -f resources/docker/ragent-dev-stack.compose.yaml
          test -f resources/docker/ragent-dev-stack.README.md
          grep -q "spring-boot-starter-actuator" bootstrap/pom.xml
          grep -q "/api/ragent/actuator/health/readiness" resources/docker/ragent-dev-stack.compose.yaml
          grep -q "EXPOSE 9090" Dockerfile
          grep -q "career-runtime" bootstrap/src/main/java/com/nageoffer/ai/ragent/career/config/OpenApiDocumentationConfig.java
          grep -q "career-export" bootstrap/src/main/java/com/nageoffer/ai/ragent/career/config/OpenApiDocumentationConfig.java
          test -f bootstrap/src/test/java/com/nageoffer/ai/ragent/career/controller/CareerOpenApiContractTest.java
          grep -q "/v3/api-docs/career-user" resources/docker/ragent-dev-stack.README.md
          grep -q "/actuator/health/readiness" resources/docker/ragent-dev-stack.README.md
