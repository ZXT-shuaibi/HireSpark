name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Backend compile
        run: mvn -B -DskipTests compile

      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: Career render smoke tests
        run: mvn -B -pl bootstrap -am "-Dtest=ResumeRenderPipelineTest" "-Dsurefire.failIfNoSpecifiedTests=false" test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  delivery-files:
    name: Delivery Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check post-fusion plan and dev stack
        run: |
          test -f docs/career-agent-platform/post-fusion-enhancement-plan.md
          test -f resources/docker/ragent-dev-stack.compose.yaml
          test -f resources/docker/ragent-dev-stack.README.md
